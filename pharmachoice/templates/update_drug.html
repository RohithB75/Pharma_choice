{% extends 'base.html' %}
{% block content %}
<section class="auth-card wide update-drug-card">
    <h2 class="login-title">Update Drug</h2>
    <form method="POST" class="form-grid">
        <div>
            <label>Drug Name</label>
            <input type="text" name="name" value="{{ drug.name }}" required>
        </div>

        <div>
            <label>Price</label>
            <input type="number" step="0.01" min="0" name="base_price" id="base_price" value="{{ drug.base_price }}" required>
        </div>

        <div>
            <label>Discount (%)</label>
            <input type="number" step="0.01" min="0" max="100" name="discount_percent" id="discount_percent" value="{{ drug.discount_percent }}" required>
        </div>

        <div>
            <label>Price After Discount</label>
            <input type="number" step="0.01" name="final_price" id="final_price" value="{{ drug.final_price }}" readonly>
        </div>

        <div>
            <label>Available Stock</label>
            <input type="number" min="0" name="stock" id="stock" value="{{ drug.stock }}" required>
        </div>

        <button type="submit" class="btn btn-secondary login-submit update-submit-btn">Update Drug</button>
    </form>
</section>

<script>
function recalcFinalPrice() {
    const basePrice = parseFloat(document.getElementById('base_price').value || '0');
    const discountPercent = parseFloat(document.getElementById('discount_percent').value || '0');
    const finalPrice = basePrice - (basePrice * discountPercent / 100);
    document.getElementById('final_price').value = finalPrice.toFixed(2);
}

document.getElementById('base_price').addEventListener('input', recalcFinalPrice);
document.getElementById('discount_percent').addEventListener('input', recalcFinalPrice);
recalcFinalPrice();
</script>
{% endblock %}
